name: Matou App Build

# when a new tag is pushed, it will run this workflow
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - mac-arm64
          - mac-x64
          - windows

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ALL='[
            {"id":"mac-x64","os":"macos-15-intel","platform":"mac","arch":"x64","make_target":"build-darwin-amd64"},
            {"id":"mac-arm64","os":"macos-latest","platform":"mac","arch":"arm64","make_target":"build-darwin-arm64"},
            {"id":"linux","os":"ubuntu-latest","platform":"linux","arch":"amd64","make_target":"build-linux-amd64"},
            {"id":"windows","os":"windows-latest","platform":"windows","arch":"amd64","make_target":"build-windows-amd64"}
          ]'

          PLATFORM="${{ inputs.platform || 'all' }}"
          if [ "$PLATFORM" = "all" ]; then
            echo "matrix={\"include\":$ALL}" >> "$GITHUB_OUTPUT"
          else
            FILTERED=$(echo "$ALL" | jq -c --arg id "$PLATFORM" '[.[] | select(.id == $id)]')
            echo "matrix={\"include\":$FILTERED}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Matou App Version
      - name: Get app version
        id: version
        shell: bash
        run: |
          echo "VERSION=$(node -p "require('./frontend/package.json').version")" >> $GITHUB_ENV

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      # Install Quasar CLI
      - name: Install Quasar CLI
        run: npm install -g @quasar/cli

      # Set up Go
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.21
          cache: false

      # Backend set up
      - name: Prepare backend modules
        run: |
          cd backend
          go mod tidy

      # Build backend
      - name: Build backend
        shell: bash {0}
        run: |
          cd backend
          make ${{ matrix.make_target }}

      # Verify backend binary
      - name: Verify backend binary
        shell: bash
        run: |
          cd backend

          # Determine expected binary path from make_target
          case "${{ matrix.make_target }}" in
            build-darwin-arm64)  BIN="bin/darwin-arm64/matou-backend" ;;
            build-darwin-amd64)  BIN="bin/darwin-amd64/matou-backend" ;;
            build-linux-amd64)   BIN="bin/linux-amd64/matou-backend" ;;
            build-windows-amd64) BIN="bin/windows-amd64/matou-backend.exe" ;;
          esac

          # 1. Verify binary exists
          if [ ! -f "$BIN" ]; then
            echo "::error::Backend binary not found at $BIN"
            exit 1
          fi
          echo "Binary found: $BIN ($(stat --format='%s' "$BIN" 2>/dev/null || stat -f '%z' "$BIN") bytes)"

          # 2. Verify binary format matches target platform
          FILE_INFO=$(file "$BIN")
          echo "File type: $FILE_INFO"

          case "${{ matrix.make_target }}" in
            build-darwin-arm64)  echo "$FILE_INFO" | grep -qi "Mach-O.*arm64" || { echo "::error::Expected Mach-O arm64 binary"; exit 1; } ;;
            build-darwin-amd64)  echo "$FILE_INFO" | grep -qi "Mach-O.*x86_64" || { echo "::error::Expected Mach-O x86_64 binary"; exit 1; } ;;
            build-linux-amd64)   echo "$FILE_INFO" | grep -qi "ELF.*x86-64" || { echo "::error::Expected ELF x86-64 binary"; exit 1; } ;;
            build-windows-amd64) echo "$FILE_INFO" | grep -qi "PE32\+\|x86-64\|Windows" || { echo "::error::Expected PE32+ Windows binary"; exit 1; } ;;
          esac
          echo "Binary format verified"

          # 3. On native platform, run the binary briefly to verify it executes
          #    The binary will print its banner then crash on missing config — that's fine,
          #    we just need to confirm it's a working executable.
          if [[ "${{ matrix.platform }}" != "windows" ]]; then
            chmod +x "$BIN"
            OUTPUT=$(timeout 5 ./"$BIN" 2>&1 || true)
            if echo "$OUTPUT" | grep -q "MATOU DAO Backend Server"; then
              echo "Binary executes correctly (startup banner detected)"
            else
              echo "::error::Binary did not produce expected startup banner"
              echo "Output was: $OUTPUT"
              exit 1
            fi
          else
            echo "Skipping execution test on Windows (cross-platform binary check only)"
          fi

      # Setup macOS Signing
      - name: Setup macOS Signing (if mac)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          cd frontend
          # write Apple API key from secret
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      # Build Electron app
      - name: Build Electron App
        shell: bash {0}
        run: |
          cd frontend
          
          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            npx quasar build -m electron --mac --${{ matrix.arch }} --publish=always
          else
            npx quasar build -m electron --publish=always
          fi
        env:
          # electron releasing and publishing
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          # apple macOS code signing + notarization
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # vite
          VITE_PROD_CONFIG_URL: ${{ secrets.VITE_PROD_CONFIG_URL }}
          VITE_ENV: ${{ secrets.VITE_ENV }}


      # Smoke test - verify the packaged app contains the backend and is runnable
      - name: Smoke test - AppImage packaging (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb

          APPIMAGE=$(find frontend/dist/electron/Packaged -name '*.AppImage' | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "::error::No AppImage found in build output"
            exit 1
          fi
          echo "Found AppImage: $APPIMAGE"
          chmod +x "$APPIMAGE"

          # Extract (no FUSE in CI runners)
          "$APPIMAGE" --appimage-extract > /dev/null 2>&1
          echo "AppImage extracted to squashfs-root/"

          # Verify the wrapper script exists (afterPack.cjs creates this for --no-sandbox)
          if [ -f "squashfs-root/matou" ]; then
            if grep -q "no-sandbox" "squashfs-root/matou"; then
              echo "Sandbox wrapper script verified"
            else
              echo "::warning::Wrapper script exists but missing --no-sandbox flag"
            fi
          fi

          # Verify backend binary is bundled at the expected path
          BACKEND_BIN="squashfs-root/resources/backend/linux-amd64/matou-backend"
          if [ ! -f "$BACKEND_BIN" ]; then
            echo "::error::Backend binary not found in package at $BACKEND_BIN"
            echo "Contents of resources/backend/:"
            find squashfs-root/resources/backend/ -type f 2>/dev/null || echo "(directory not found)"
            exit 1
          fi
          echo "Backend binary found in package: $BACKEND_BIN"

          # Verify the backend binary executes inside the package
          chmod +x "$BACKEND_BIN"
          OUTPUT=$(timeout 5 "$BACKEND_BIN" 2>&1 || true)
          if echo "$OUTPUT" | grep -q "MATOU DAO Backend Server"; then
            echo "Packaged backend binary executes correctly"
          else
            echo "::error::Packaged backend binary did not produce startup banner"
            echo "Output was: $OUTPUT"
            exit 1
          fi

          # Launch the full Electron app briefly to verify it starts
          xvfb-run --auto-servernum ./squashfs-root/matou --no-sandbox &
          APP_PID=$!
          sleep 10

          # Check the process is still alive (didn't crash immediately)
          if kill -0 $APP_PID 2>/dev/null; then
            echo "Electron app process is running after 10s (PID $APP_PID)"
            kill $APP_PID 2>/dev/null || true
            wait $APP_PID 2>/dev/null || true
          else
            echo "::error::Electron app process died within 10s"
            exit 1
          fi

          rm -rf squashfs-root/

      - name: Smoke test - DMG packaging (macOS)
        if: matrix.platform == 'mac'
        run: |
          DMG=$(find frontend/dist/electron/Packaged -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No DMG found in build output"
            exit 1
          fi
          echo "Found DMG: $DMG"

          # Mount the DMG
          hdiutil attach "$DMG" -nobrowse -quiet
          MOUNT=$(find /Volumes -maxdepth 1 -name 'Matou*' | head -1)
          if [ -z "$MOUNT" ]; then
            echo "::error::DMG mounted but Matou volume not found"
            exit 1
          fi
          echo "DMG mounted at: $MOUNT"

          # Verify the .app bundle exists
          APP_BUNDLE=$(find "$MOUNT" -maxdepth 1 -name '*.app' | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "::error::No .app bundle found in DMG"
            hdiutil detach "$MOUNT" -quiet
            exit 1
          fi
          echo "App bundle: $APP_BUNDLE"

          # Map runner arch to binary directory
          case "${{ matrix.arch }}" in
            arm64) ARCH_DIR="darwin-arm64" ;;
            x64)   ARCH_DIR="darwin-amd64" ;;
          esac

          # Verify backend binary is bundled at the expected path
          BACKEND_BIN="$APP_BUNDLE/Contents/Resources/backend/$ARCH_DIR/matou-backend"
          if [ ! -f "$BACKEND_BIN" ]; then
            echo "::error::Backend binary not found in app bundle at $BACKEND_BIN"
            echo "Contents of Resources/backend/:"
            find "$APP_BUNDLE/Contents/Resources/backend/" -type f 2>/dev/null || echo "(directory not found)"
            hdiutil detach "$MOUNT" -quiet
            exit 1
          fi
          echo "Backend binary found in app bundle"

          # Verify the backend binary executes
          OUTPUT=$(timeout 5 "$BACKEND_BIN" 2>&1 || true)
          if echo "$OUTPUT" | grep -q "MATOU DAO Backend Server"; then
            echo "Packaged backend binary executes correctly"
          else
            echo "::error::Packaged backend binary did not produce startup banner"
            echo "Output was: $OUTPUT"
            hdiutil detach "$MOUNT" -quiet
            exit 1
          fi

          # Verify code signing (macOS-specific)
          if codesign --verify --deep --strict "$APP_BUNDLE" 2>/dev/null; then
            echo "Code signature verified"
          else
            echo "::warning::Code signature verification failed (may be expected without signing secrets)"
          fi

          hdiutil detach "$MOUNT" -quiet

      - name: Smoke test - NSIS installer (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path frontend/dist/electron/Packaged -Filter '*.exe' -Recurse | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe installer found in build output"
            exit 1
          }
          Write-Host "Found installer: $($exe.FullName)"

          # Run the NSIS installer silently
          $installDir = "$env:TEMP\MatouSmokeTest"
          Write-Host "Installing to: $installDir"
          $proc = Start-Process $exe.FullName -ArgumentList '/S', "/D=$installDir" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Error "Installer exited with code $($proc.ExitCode)"
            exit 1
          }

          # Verify installation directory exists
          if (-not (Test-Path $installDir)) {
            Write-Error "Installation directory not found at $installDir"
            exit 1
          }

          # Verify backend binary is bundled
          $backendBin = Get-ChildItem -Path "$installDir\resources\backend\windows-amd64" -Filter 'matou-backend.exe' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $backendBin) {
            Write-Error "Backend binary not found in installed app"
            Write-Host "Contents of resources\backend\:"
            Get-ChildItem "$installDir\resources\backend\" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Write-Host "Backend binary found: $($backendBin.FullName)"

          # Verify the backend binary executes
          $output = & $backendBin.FullName 2>&1 | Out-String
          if ($output -match "MATOU DAO Backend Server") {
            Write-Host "Packaged backend binary executes correctly"
          } else {
            Write-Error "Packaged backend binary did not produce startup banner"
            Write-Host "Output was: $output"
            exit 1
          }

          # Verify main Electron executable exists
          $mainExe = Get-ChildItem -Path $installDir -Filter 'Matou.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($mainExe) {
            Write-Host "Main executable found: $($mainExe.FullName)"
          } else {
            Write-Error "Main Matou.exe not found in installation"
            exit 1
          }

          # Clean up
          Start-Process "$installDir\Uninstall Matou.exe" -ArgumentList '/S' -Wait -ErrorAction SilentlyContinue

      # Upload artifacts
      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: matou-${{ env.VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: frontend/dist/electron/Packaged/**
          if-no-files-found: error
